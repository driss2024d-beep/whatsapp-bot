<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Bot WhatsApp</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --green:#25D366; --gd:#1ebe5a; --gl:#e8f5e9;
  --red:#ef5350; --blue:#1976D2; --orange:#FB8C00; --purple:#7B1FA2;
  --bg:#f0f2f5; --shadow:0 2px 12px rgba(0,0,0,0.08);
  --r:12px; --rs:8px;
}
body { font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); }

/* LOGIN */
#LP { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#1a1a2e,#0f3460); }
.lbox { background:white; border-radius:20px; padding:40px; width:100%; max-width:400px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
.lbox h1 { font-size:22px; font-weight:700; color:#1a1a2e; margin:10px 0 4px; }
.lbox p  { color:#888; font-size:13px; margin-bottom:28px; }
.li { width:100%; padding:13px; border:2px solid #e0e0e0; border-radius:var(--rs); font-size:15px; margin-bottom:14px; text-align:right; font-family:inherit; }
.li:focus { outline:none; border-color:var(--green); }
.lb { width:100%; padding:13px; background:var(--green); color:white; border:none; border-radius:var(--rs); font-size:16px; font-weight:600; cursor:pointer; font-family:inherit; }
.lb:hover { background:var(--gd); }
.lerr { background:#ffebee; color:var(--red); padding:10px; border-radius:var(--rs); margin-top:12px; font-size:13px; display:none; }

/* APP */
#AP { display:none; }
.hdr { background:linear-gradient(135deg,var(--green),var(--gd)); color:white; padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:64px; position:sticky; top:0; z-index:100; box-shadow:0 2px 10px rgba(37,211,102,0.3); }
.htitle { font-size:18px; font-weight:700; }
.hsub   { font-size:12px; opacity:0.85; }
.ubadge { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.2); padding:8px 14px; border-radius:20px; font-size:13px; cursor:pointer; }
.ubadge:hover { background:rgba(255,255,255,0.3); }
.rchip { background:rgba(255,255,255,0.9); color:var(--gd); font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; }
.rchip.admin { color:#d32f2f; }
.wrap { max-width:960px; margin:0 auto; padding:24px 16px; }

/* CARDS */
.card { background:white; border-radius:var(--r); padding:24px; margin-bottom:20px; box-shadow:var(--shadow); }
.ctitle { font-size:16px; font-weight:700; color:#1a1a1a; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
.cdot { width:4px; height:18px; background:var(--green); border-radius:2px; }

/* FORM */
.fg { margin-bottom:12px; }
.fg label { display:block; font-size:13px; font-weight:600; color:#444; margin-bottom:5px; }
input[type=text], input[type=password], input[type=number], textarea {
  width:100%; padding:10px 14px; border:1.5px solid #e0e0e0; border-radius:var(--rs);
  font-size:14px; font-family:inherit; background:#fafafa;
}
input:focus, textarea:focus { outline:none; border-color:var(--purple); background:white; }
textarea { height:70px; resize:vertical; }

/* BUTTONS */
.btn { padding:9px 18px; border:none; border-radius:var(--rs); cursor:pointer; font-size:13px; font-weight:600; font-family:inherit; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
.btn:hover { transform:translateY(-1px); opacity:0.9; }
.bg  { background:var(--green);  color:white; }
.br  { background:var(--red);    color:white; }
.bb  { background:var(--blue);   color:white; }
.bo  { background:var(--orange); color:white; }
.bp  { background:var(--purple); color:white; }
.sm  { padding:5px 12px; font-size:12px; }

/* ENTREPRISE */
.ecard { border:1.5px solid #e8e8e8; border-radius:var(--r); margin-bottom:16px; overflow:hidden; }
.ehdr  { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:linear-gradient(to left,#f8fffe,#f0faf5); border-bottom:1px solid #e8e8e8; flex-wrap:wrap; gap:10px; }
.einfo h3 { font-size:16px; font-weight:700; margin-bottom:4px; }
.einfo p  { font-size:13px; color:#666; margin-top:2px; }
.eact { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.sa { background:#e8f5e9; color:#2e7d32; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; }
.si { background:#ffebee; color:#c62828; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; }
.ebody { padding:20px; }

/* ÉTAPE */
.etcard { border:2px solid var(--purple); border-radius:var(--r); margin-bottom:14px; overflow:hidden; }
.ethdr  { display:flex; align-items:center; gap:12px; padding:12px 16px; background:linear-gradient(to left,#f3e5f5,#ede7f6); border-bottom:1px solid #ce93d8; }
.etnum  { width:34px; height:34px; background:var(--purple); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; flex-shrink:0; }
.etinfo { flex:1; }
.etq    { font-size:14px; font-weight:700; color:#4a148c; }
.etbody { padding:14px 16px; background:white; }

/* OPTION */
.ocard { display:flex; align-items:center; justify-content:space-between; background:#f3e5f5; border:1px solid #ce93d8; border-right:4px solid var(--purple); border-radius:var(--rs); padding:10px 14px; margin-bottom:8px; }
.otxt  { font-weight:600; font-size:14px; }

/* ZONES */
.azone  { background:#fafafa; border:1.5px dashed #ccc; border-radius:var(--rs); padding:14px; margin-top:10px; }
.aetzone { background:#f3e5f5; border:2px dashed #ce93d8; border-radius:var(--rs); padding:16px; margin-top:16px; }
.aztitle { font-size:13px; font-weight:700; margin-bottom:10px; }

/* FLOW */
.flow { background:linear-gradient(135deg,#1a1a2e,#16213e); border-radius:var(--rs); padding:12px 16px; margin-bottom:16px; display:flex; align-items:center; flex-wrap:wrap; gap:8px; }

/* ADMIN BAR */
.abar { background:linear-gradient(135deg,#fff3e0,#fff8e1); border:2px solid var(--orange); border-radius:var(--r); padding:16px; margin-bottom:20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.abar label { font-weight:700; color:#e65100; font-size:14px; white-space:nowrap; }
.abar select { margin:0; max-width:300px; width:auto; padding:10px 14px; border:1.5px solid #e0e0e0; border-radius:var(--rs); font-size:14px; font-family:inherit; background:#fafafa; }

/* TABS */
.tabs { display:flex; border-bottom:2px solid #e0e0e0; margin-bottom:20px; }
.tab  { padding:10px 20px; font-size:14px; font-weight:600; color:#888; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; }
.tab.active { color:var(--green); border-bottom-color:var(--green); }

/* TOAST */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:#323232; color:white; padding:12px 24px; border-radius:24px; font-size:14px; z-index:9999; transition:transform 0.3s; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.ok   { background:#2e7d32; }
.toast.err  { background:#c62828; }
.toast.info { background:#1565C0; }

.spin { display:inline-block; width:22px; height:22px; border:3px solid #e0e0e0; border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading { text-align:center; padding:30px; color:#aaa; }

@media(max-width:600px) {
  .hdr,.wrap { padding-left:14px; padding-right:14px; }
  .ehdr,.abar { flex-direction:column; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="LP">
  <div class="lbox">
    <div style="font-size:48px">🤖</div>
    <h1>Dashboard WhatsApp Bot</h1>
    <p>سجّل دخولك للوصول إلى لوحة التحكم</p>
    <input class="li" type="text"     id="lnum" placeholder="رقم WhatsApp">
    <input class="li" type="password" id="lpwd" placeholder="كلمة المرور">
    <button class="lb" onclick="login()">🔐 تسجيل الدخول</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="AP">
  <header class="hdr">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:24px">🤖</span>
      <div>
        <div class="htitle">Dashboard Bot WhatsApp</div>
        <div class="hsub" id="hsub">لوحة التحكم</div>
      </div>
    </div>
    <div class="ubadge" onclick="logout()">
      <span id="huname"></span>
      <span class="rchip" id="hrole">CLIENT</span>
      <span>🚪</span>
    </div>
  </header>

  <div class="wrap">

    <div class="tabs" id="atabs" style="display:none">
      <div class="tab active" onclick="switchTab('e')">🏢 الشركات</div>
      <div class="tab" onclick="switchTab('u')">👥 المستخدمين</div>
    </div>

    <!-- TAB ENTREPRISES -->
    <div id="te">
      <div class="abar" id="abar" style="display:none">
        <label>🔧 وضع المدير :</label>
        <select id="asel" onchange="aselChange()"><option value="">— عرض الكل —</option></select>
        <button class="btn bg sm" onclick="showAF()">➕ شركة جديدة</button>
      </div>

      <div class="card" id="AF" style="display:none">
        <div class="ctitle"><div class="cdot"></div>➕ إضافة شركة جديدة</div>
        <div class="fg"><label>اسم الشركة</label><input type="text" id="fn" placeholder="Boutique Moda"></div>
        <div class="fg"><label>رقم WhatsApp</label><input type="text" id="fnum" placeholder="212612838772"></div>
        <div class="fg"><label>كلمة مرور العميل</label><input type="text" id="fpwd" placeholder="boutique123"></div>
        <div class="fg"><label>رسالة الترحيب</label><textarea id="fsal" placeholder="مرحبا بك ! 👋"></textarea></div>
        <div class="fg"><label>رسالة الخاتمة (تظهر في ملخص الطلب)</label><textarea id="frec" placeholder="شكراً ! سنتواصل معك قريباً 😊"></textarea></div>
        <button class="btn bg" onclick="addE()">✅ إضافة</button>
        <button class="btn br" onclick="hideAF()" style="margin-right:8px">❌ إلغاء</button>
      </div>

      <div class="card">
        <div class="ctitle"><div class="cdot"></div>🏢 الشركات والاستبيانات</div>
        <div id="elist"><div class="loading"><span class="spin"></span></div></div>
      </div>
    </div>

    <!-- TAB USERS -->
    <div id="tu" style="display:none">
      <div class="card">
        <div class="ctitle"><div class="cdot"></div>👥 المستخدمين</div>
        <div id="ulist"></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════
// ⚙️ CONFIG — CHANGEZ ICI
// ════════════════════════════════════
const API   = 'https://web-production-53c34.up.railway.app';
const ANUM  = '212600000000'; // numéro admin
const AKEY  = 'admin@2025!';  // clé admin (même valeur que ADMIN_KEY dans Railway)

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
let me   = null;   // utilisateur connecté
let data = [];     // toutes les entreprises
let selId = null;  // entreprise sélectionnée (admin)

// ════════════════════════════════════
// AUTH
// ════════════════════════════════════
async function login() {
  const num = document.getElementById('lnum').value.trim();
  const pwd = document.getElementById('lpwd').value.trim();
  if (!num || !pwd) return lerr('يرجى ملء جميع الحقول');

  // Admin
  if (num === ANUM && pwd === AKEY) {
    me = { num, role:'admin', nom:'👑 المدير', pwd };
    boot(); load(); return;
  }

  // Client
  try {
    const r = await fetch(`${API}/api/auth/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ numeroWhatsApp:num, motdepasse:pwd })
    });
    const d = await r.json();
    if (r.ok && d.entreprise) {
      me = { num, role:'client', nom:d.entreprise.nom, pwd, eid:d.entreprise._id };
      data = [d.entreprise];
      boot(); render();
    } else lerr(d.error || 'رقم أو كلمة مرور غير صحيحة');
  } catch { lerr('خطأ في الاتصال بالخادم'); }
}

function lerr(msg) {
  const e = document.getElementById('lerr');
  e.textContent = '❌ ' + msg; e.style.display = 'block';
  setTimeout(() => e.style.display = 'none', 3000);
}

function boot() {
  document.getElementById('LP').style.display = 'none';
  document.getElementById('AP').style.display = 'block';
  document.getElementById('huname').textContent = me.nom;
  const c = document.getElementById('hrole');
  if (me.role === 'admin') {
    c.textContent = 'ADMIN'; c.classList.add('admin');
    document.getElementById('atabs').style.display = 'flex';
    document.getElementById('abar').style.display  = 'flex';
    document.getElementById('hsub').textContent    = 'وضع المدير — صلاحيات كاملة';
  } else {
    c.textContent = 'CLIENT';
    document.getElementById('hsub').textContent = me.nom;
  }
}

function logout() {
  if (!confirm('تسجيل الخروج ؟')) return;
  me = null; data = []; selId = null;
  document.getElementById('AP').style.display = 'none';
  document.getElementById('LP').style.display = 'flex';
  document.getElementById('lnum').value = '';
  document.getElementById('lpwd').value = '';
}

// ════════════════════════════════════
// TABS
// ════════════════════════════════════
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', i===(t==='e'?0:1)));
  document.getElementById('te').style.display = t==='e'?'block':'none';
  document.getElementById('tu').style.display = t==='u'?'block':'none';
  if (t==='u') renderUsers();
}

// ════════════════════════════════════
// LOAD (admin seulement)
// ════════════════════════════════════
async function load() {
  document.getElementById('elist').innerHTML = '<div class="loading"><span class="spin"></span></div>';
  try {
    const r = await fetch(`${API}/api/entreprises`, { headers:{'x-admin-key':AKEY} });
    if (!r.ok) throw new Error('Erreur ' + r.status);
    data = await r.json();
    // Mettre à jour sélecteur
    const s = document.getElementById('asel');
    const p = s.value;
    s.innerHTML = '<option value="">— عرض الكل —</option>' +
      data.map(e=>`<option value="${e._id}">${e.nom} (${e.numeroWhatsApp})</option>`).join('');
    if (p) s.value = p;
    render();
  } catch(err) {
    document.getElementById('elist').innerHTML = `<p style="color:red;text-align:center;padding:20px">❌ خطأ في الاتصال<br><small>${err.message}</small></p>`;
  }
}

function aselChange() { selId = document.getElementById('asel').value; render(); }

// ════════════════════════════════════
// RENDER
// ════════════════════════════════════
function render() {
  const el = document.getElementById('elist');
  const list = me.role==='admin'
    ? (selId ? data.filter(e=>e._id===selId) : data)
    : data;
  if (!list.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa"><p style="font-size:40px">🏢</p><p>لا توجد شركات.</p></div>';
    return;
  }
  el.innerHTML = list.map(e=>renderE(e)).join('');
}

function renderE(e) {
  const isA  = me.role==='admin';
  const ets  = [...(e.etapes||[])].sort((a,b)=>a.ordre-b.ordre);
  const id   = e._id;
  return `
  <div class="ecard">
    <div class="ehdr">
      <div class="einfo">
        <h3>🏢 ${e.nom}</h3>
        <p>📱 ${e.numeroWhatsApp}</p>
        <p>👋 ${e.salutation||'—'}</p>
        <p>🏁 ${e.messageRecap||'—'}</p>
        ${isA?`<p style="color:#aaa;font-size:11px">🔑 ${e.motdepasse||'—'}</p>`:''}
      </div>
      <div class="eact">
        <span class="${e.actif?'sa':'si'}">${e.actif?'✅ نشط':'❌ متوقف'}</span>
        ${isA?`
          <button class="btn bo sm" onclick="toggleA('${id}',${e.actif})">${e.actif?'⏸ إيقاف':'▶️ تشغيل'}</button>
          <button class="btn br sm" onclick="delE('${id}')">🗑️ حذف</button>
        `:''}
      </div>
    </div>
    <div class="ebody">

      ${ets.length?`
        <div class="flow">
          <span style="font-size:12px;color:var(--green)">▶️ بداية</span>
          ${ets.map(et=>`<span style="color:#555">→</span><span style="background:var(--purple);color:white;padding:3px 10px;border-radius:12px;font-size:12px">${et.question.substring(0,20)}</span>`).join('')}
          <span style="color:#555">→</span>
          <span style="background:var(--green);color:white;padding:3px 10px;border-radius:12px;font-size:12px">📋 ملخص</span>
        </div>
      `:''}

      <p style="font-size:13px;color:#555;font-weight:600;margin-bottom:12px">📋 الخطوات (${ets.length}) :</p>

      ${ets.length===0
        ?'<p style="color:#aaa;font-size:13px;margin-bottom:12px">لا توجد خطوات بعد.</p>'
        :ets.map((et,ei)=>renderEt(id,et,ei)).join('')}

      <div class="aetzone">
        <div class="aztitle" style="color:var(--purple)">➕ إضافة خطوة جديدة :</div>
        <div style="display:grid;grid-template-columns:100px 1fr;gap:10px;margin-bottom:10px">
          <div class="fg" style="margin:0"><label>الترتيب</label><input type="number" id="eo_${id}" value="${ets.length+1}" min="1"></div>
          <div class="fg" style="margin:0"><label>السؤال</label><input type="text" id="eq_${id}" placeholder="مثال: شمن موديل ختريتي ؟"></div>
        </div>
        <button class="btn bp" onclick="addEt('${id}')">➕ إضافة الخطوة</button>
      </div>
    </div>
  </div>`;
}

function renderEt(eid, et, ei) {
  const opts = et.options||[];
  return `
  <div class="etcard">
    <div class="ethdr">
      <div class="etnum">${et.ordre}</div>
      <div class="etinfo">
        <div class="etq">❓ ${et.question}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">${opts.length} خيار</div>
      </div>
      <button class="btn br sm" onclick="delEt('${eid}',${ei})">🗑️</button>
    </div>
    <div class="etbody">
      <p style="font-size:12px;font-weight:700;color:var(--purple);margin-bottom:8px">🎯 الخيارات :</p>
      ${opts.length===0
        ?'<p style="color:#aaa;font-size:12px;margin-bottom:8px">لا توجد خيارات بعد.</p>'
        :opts.map((o,oi)=>`
          <div class="ocard">
            <div class="otxt">▪️ ${o.texte}</div>
            <button class="btn br sm" onclick="delOpt('${eid}',${ei},${oi})">🗑️</button>
          </div>`).join('')}
      <div class="azone">
        <div class="aztitle">➕ إضافة خيار :</div>
        <div style="display:flex;gap:10px;align-items:flex-end">
          <div class="fg" style="margin:0;flex:1"><label>نص الخيار</label><input type="text" id="ot_${eid}_${ei}" placeholder="مثال: الموديل 1"></div>
          <button class="btn bb sm" style="height:40px;flex-shrink:0" onclick="addOpt('${eid}',${ei})">➕ إضافة</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════
// CRUD ENTREPRISE
// ════════════════════════════════════
function showAF() { document.getElementById('AF').style.display='block'; document.getElementById('AF').scrollIntoView({behavior:'smooth'}); }
function hideAF() { document.getElementById('AF').style.display='none'; }

async function addE() {
  const n = document.getElementById('fn').value.trim();
  const u = document.getElementById('fnum').value.trim();
  const p = document.getElementById('fpwd').value.trim();
  const s = document.getElementById('fsal').value.trim();
  const r = document.getElementById('frec').value.trim();
  if (!n||!u||!p||!s) return toast('❌ يرجى ملء جميع الحقول','err');
  toast('⏳ جاري الإضافة...','info');
  const res = await fetch(`${API}/api/entreprises`,{
    method:'POST',headers:{'Content-Type':'application/json','x-admin-key':AKEY},
    body:JSON.stringify({nom:n,numeroWhatsApp:u,motdepasse:p,salutation:s,messageRecap:r,etapes:[],actif:true})
  });
  if (!res.ok) return toast('❌ خطأ في الإضافة','err');
  ['fn','fnum','fpwd','fsal','frec'].forEach(id=>document.getElementById(id).value='');
  hideAF(); toast('✅ تمت الإضافة !','ok');
  await load();
}

async function delE(id) {
  if (!confirm('حذف هذه الشركة نهائياً ؟')) return;
  await fetch(`${API}/api/entreprises/${id}`,{method:'DELETE',headers:{'x-admin-key':AKEY}});
  if (selId===id) selId=null;
  toast('🗑️ تم الحذف','ok');
  await load();
}

async function toggleA(id, actif) {
  await save(id, { actif:!actif });
  toast(actif?'⏸ تم الإيقاف':'▶️ تم التشغيل','ok');
}

// ════════════════════════════════════
// SAVE HELPER
// ════════════════════════════════════
async function save(id, body) {
  const h = me.role==='admin'
    ? {'Content-Type':'application/json','x-admin-key':AKEY}
    : {'Content-Type':'application/json','x-client-numero':me.num,'x-client-password':me.pwd};
  const r = await fetch(`${API}/api/entreprises/${id}`,{method:'PUT',headers:h,body:JSON.stringify(body)});
  const d = await r.json();
  if (!r.ok) { toast('❌ خطأ: '+(d.error||r.status),'err'); return false; }
  // Recharger
  if (me.role==='admin') await load();
  else {
    const r2 = await fetch(`${API}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({numeroWhatsApp:me.num,motdepasse:me.pwd})});
    const d2 = await r2.json();
    if (d2.entreprise) { data=[d2.entreprise]; render(); }
  }
  return true;
}

// ════════════════════════════════════
// CRUD ÉTAPES
// ════════════════════════════════════
async function addEt(id) {
  const o = parseInt(document.getElementById(`eo_${id}`).value);
  const q = document.getElementById(`eq_${id}`).value.trim();
  if (!o||!q) return toast('❌ أدخل الترتيب والسؤال','err');
  const e = copy(data.find(x=>x._id===id));
  if (e.etapes.find(et=>et.ordre===o)) return toast(`❌ الترتيب ${o} موجود مسبقاً !`,'err');
  e.etapes.push({ordre:o,question:q,options:[]});
  e.etapes.sort((a,b)=>a.ordre-b.ordre);
  toast('⏳ جاري الحفظ...','info');
  if (await save(id,e)) toast('✅ تمت إضافة الخطوة !','ok');
}

async function delEt(id, ei) {
  if (!confirm('حذف هذه الخطوة ؟')) return;
  const e = copy(data.find(x=>x._id===id));
  e.etapes.splice(ei,1);
  toast('⏳ جاري الحذف...','info');
  if (await save(id,e)) toast('🗑️ تم حذف الخطوة','ok');
}

// ════════════════════════════════════
// CRUD OPTIONS
// ════════════════════════════════════
async function addOpt(id, ei) {
  const t = document.getElementById(`ot_${id}_${ei}`).value.trim();
  if (!t) return toast('❌ أدخل نص الخيار','err');
  const e = copy(data.find(x=>x._id===id));
  if (!e.etapes[ei].options) e.etapes[ei].options=[];
  e.etapes[ei].options.push({texte:t});
  toast('⏳ جاري الحفظ...','info');
  if (await save(id,e)) toast('✅ تمت إضافة الخيار !','ok');
}

async function delOpt(id, ei, oi) {
  if (!confirm('حذف هذا الخيار ؟')) return;
  const e = copy(data.find(x=>x._id===id));
  e.etapes[ei].options.splice(oi,1);
  toast('⏳ جاري الحذف...','info');
  if (await save(id,e)) toast('🗑️ تم حذف الخيار','ok');
}

// ════════════════════════════════════
// USERS
// ════════════════════════════════════
function renderUsers() {
  const d = document.getElementById('ulist');
  if (!data.length) { d.innerHTML='<p style="text-align:center;padding:40px;color:#aaa">لا يوجد مستخدمون.</p>'; return; }
  d.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:13px">
    <thead><tr style="background:#f5f5f5;text-align:right">
      <th style="padding:10px;border-bottom:2px solid #eee">الشركة</th>
      <th style="padding:10px;border-bottom:2px solid #eee">رقم WhatsApp</th>
      <th style="padding:10px;border-bottom:2px solid #eee">كلمة المرور</th>
      <th style="padding:10px;border-bottom:2px solid #eee">الحالة</th>
      <th style="padding:10px;border-bottom:2px solid #eee">الخطوات</th>
      <th style="padding:10px;border-bottom:2px solid #eee">الخيارات</th>
    </tr></thead>
    <tbody>${data.map(e=>`
      <tr style="border-bottom:1px solid #f0f0f0">
        <td style="padding:10px;font-weight:600">🏢 ${e.nom}</td>
        <td style="padding:10px">📱 ${e.numeroWhatsApp}</td>
        <td style="padding:10px"><code style="background:#f5f5f5;padding:2px 8px;border-radius:4px">${e.motdepasse||'—'}</code></td>
        <td style="padding:10px"><span class="${e.actif?'sa':'si'}">${e.actif?'نشط':'متوقف'}</span></td>
        <td style="padding:10px;text-align:center">${(e.etapes||[]).length}</td>
        <td style="padding:10px;text-align:center">${(e.etapes||[]).reduce((s,et)=>s+(et.options||[]).length,0)}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

// ════════════════════════════════════
// UTILS
// ════════════════════════════════════
const copy = obj => JSON.parse(JSON.stringify(obj));

let tt;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (type?' '+type:'');
  el.classList.add('show');
  clearTimeout(tt);
  if (type !== 'info') tt = setTimeout(() => el.classList.remove('show'), 3000);
}

document.getElementById('lpwd').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
